<!-- SHARED HEAD STYLES — copy into each inner page -->
<!-- fonts + css vars + tribal-bar + top-nav + page-hero + footer -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:wght@300;400;600&family=Cinzel:wght@400;600&display=swap" rel="stylesheet"/>
<style>
  :root { --gold:#C8972A; --deep:#1A0A00; --crimson:#8B1A1A; --cream:#FAF3E8; --silver:#C0C0C0; }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  html{scroll-behavior:smooth;}
  body{font-family:'Cormorant Garamond',serif;background:var(--deep);color:var(--cream);overflow-x:hidden;}
  .tribal-bar{height:6px;background:repeating-linear-gradient(90deg,#8B1A1A 0px,#8B1A1A 12px,#C8972A 12px,#C8972A 24px,#1A0A00 24px,#1A0A00 36px,#C8972A 36px,#C8972A 48px);}
  .top-nav{display:flex;align-items:center;justify-content:space-between;padding:18px 48px;background:rgba(26,10,0,0.97);border-bottom:1px solid rgba(200,151,42,0.15);position:sticky;top:0;z-index:100;backdrop-filter:blur(12px);}
  .back-link{font-family:'Cinzel',serif;font-size:0.68rem;letter-spacing:0.2em;color:rgba(250,243,232,0.6);text-decoration:none;display:flex;align-items:center;gap:8px;transition:color 0.3s;}
  .back-link:hover{color:var(--gold);}
  .brand-small{font-family:'Playfair Display',serif;font-size:1.25rem;background:linear-gradient(135deg,#FAF3E8 20%,var(--gold) 60%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-decoration:none;}
  .nav-links{display:flex;gap:28px;}
  .nav-links a{font-family:'Cinzel',serif;font-size:0.58rem;letter-spacing:0.25em;color:rgba(250,243,232,0.4);text-decoration:none;transition:color 0.3s;}
  .nav-links a:hover,.nav-links a.active{color:var(--gold);}
  @media(max-width:640px){.top-nav{padding:14px 20px;}.nav-links{display:none;}}
  .page-hero{padding:64px 20px 56px;text-align:center;background:radial-gradient(ellipse at 50% 0%,#3d1a00 0%,#1A0A00 70%);border-bottom:1px solid rgba(200,151,42,0.2);}
  .page-eyebrow{font-family:'Cinzel',serif;font-size:0.65rem;letter-spacing:0.4em;color:var(--gold);text-transform:uppercase;margin-bottom:14px;}
  .page-title{font-family:'Playfair Display',serif;font-size:clamp(2.2rem,5vw,3.8rem);font-weight:700;color:var(--cream);margin-bottom:14px;}
  .page-subtitle{font-family:'Cormorant Garamond',serif;font-size:1.1rem;color:rgba(250,243,232,0.6);max-width:520px;margin:0 auto;line-height:1.8;}
  footer{padding:44px 20px 28px;text-align:center;border-top:1px solid rgba(200,151,42,0.15);}
  .footer-brand{font-family:'Playfair Display',serif;font-size:1.5rem;background:linear-gradient(135deg,#FAF3E8 20%,var(--gold) 60%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:10px;}
  .footer-tagline{font-family:'Cinzel',serif;font-size:0.58rem;letter-spacing:0.32em;color:rgba(250,243,232,0.3);margin-bottom:20px;}
  .footer-nav{display:flex;justify-content:center;gap:28px;flex-wrap:wrap;margin-bottom:22px;}
  .footer-nav a{font-family:'Cinzel',serif;font-size:0.58rem;letter-spacing:0.25em;color:rgba(250,243,232,0.35);text-decoration:none;transition:color 0.3s;}
  .footer-nav a:hover{color:var(--gold);}
  .footer-copy{font-family:'Cinzel',serif;font-size:0.55rem;color:rgba(250,243,232,0.2);letter-spacing:0.2em;}
  .reveal{opacity:0;transform:translateY(40px);transition:opacity 0.8s ease,transform 0.8s ease;}
  .reveal.visible{opacity:1;transform:translateY(0);}
  @keyframes fadeUp{from{opacity:0;transform:translateY(30px);}to{opacity:1;transform:translateY(0);}}
</style>
